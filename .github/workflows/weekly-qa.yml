name: Weekly QA

# Fetches upstream extension samples and verifies the *published* Extension.js
# CLI can build them. Runs weekly + on demand. Goes red only on regressions
# (a sample that built last week and no longer does).
#
# Two lanes:
#   linux: chrome,firefox,edge (the gating baseline → baseline.json)
#   macos: safari + the chromium browsers, non-gating until a stable Safari
#            baseline exists (→ baseline.safari.json)
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      extension_tag:
        description: 'Extension.js dist-tag to test (latest | canary | next)'
        default: 'latest'

permissions:
  contents: read
  issues: write

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EXTENSION_TAG: ${{ github.event.inputs.extension_tag || 'latest' }}
      QA_CONCURRENCY: '6'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - run: node scripts/sync.mjs
      # Corpus guard: tracked corpus dirs must be exactly what vendor.mjs wrote
      # (tamper gates the job). Also reports how far upstream moved past the
      # vendored cut; drift is informational: refreshing the corpus is a
      # deliberate `npm run vendor` + commit after a CLEAN run, never automatic.
      - name: Vendored corpus check
        run: node scripts/vendor.mjs --check
      - run: node scripts/discover.mjs
      # One pass over the whole corpus: install-tier samples get `npm install`,
      # raw samples build as-is. Produces a single complete report.
      - run: node scripts/run-matrix.mjs --tier all --install --browsers chrome,firefox,edge
      # report writes diff.json + REPORT.md. It suppresses regressions when the
      # scoring criteria changed since the baseline (re-baseline, not a regression).
      # Don't gate here — a raw pass→fail may still be a flake.
      - name: Report
        run: node scripts/report.mjs --markdown
        continue-on-error: true
      # Re-run only the regressing samples; a regression that clears on re-run was
      # flaky infra and is dropped. Writes confirmed-regressions.json. Don't gate
      # here — status.mjs is the single verdict.
      - id: confirm
        run: node scripts/confirm-regressions.mjs
        continue-on-error: true
      # Single "are we clean?" verdict → job summary (shown on the run page and via
      # the README badge) + the job's pass/fail gate.
      - name: Status
        run: node scripts/status.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: qa-report-linux, path: reports/}
      - name: Open issue on confirmed regression
        if: failure() && steps.confirm.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('reports/REPORT.md', 'utf8');
            try {
              const c = JSON.parse(fs.readFileSync('reports/confirmed-regressions.json', 'utf8'));
              body += `\n\n## Confirmed regressions (survived re-run)\n` +
                c.confirmed.map((id) => `- \`${id}\``).join('\n') +
                (c.cleared.length ? `\n\n_Cleared as flaky: ${c.cleared.map((x) => x.id).join(', ')}_` : '');
            } catch {}
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Weekly QA regression (linux): ${new Date().toISOString().slice(0,10)}`,
              body, labels: ['qa-regression'],
            });

  macos:
    runs-on: macos-latest # Safari builds via Xcode: macOS only
    timeout-minutes: 90
    continue-on-error: true # non-gating until a stable Safari baseline is recorded
    env:
      EXTENSION_TAG: ${{ github.event.inputs.extension_tag || 'latest' }}
      QA_CONCURRENCY: '4'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - run: node scripts/sync.mjs
      - run: node scripts/discover.mjs
      - run: node scripts/run-matrix.mjs --tier all --install --browsers chrome,firefox,edge,safari
      - run: node scripts/report.mjs --markdown --baseline baseline.safari.json
        continue-on-error: true
      - name: Status
        run: node scripts/status.mjs
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: qa-report-macos, path: reports/}
